<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; overflow:hidden; }
svg { width:165px; height:165px; }
.label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

/* Lightning bolt flashes */
#bolt1 { animation: boltFlash 2.4s ease-in-out infinite; }
#bolt2 { animation: boltFlash 2.4s ease-in-out infinite 1.2s; }
@keyframes boltFlash {
  0%,60%,100%  { opacity:0; filter:none; }
  62%          { opacity:1; filter:drop-shadow(0 0 8px #FFD700); }
  65%          { opacity:0.5; }
  67%          { opacity:1; filter:drop-shadow(0 0 15px #FFFFFF); }
  72%,95%      { opacity:0; }
}
/* Cloud dark/flash */
#cloud { animation: cloudFlash 2.4s ease-in-out infinite; }
@keyframes cloudFlash {
  0%,59%,100% { fill:#1A2040; }
  62%,68%     { fill:#3A4080; }
  65%         { fill:#5A60C0; }
}
/* Cloud 2 rumble */
#cloud2 { animation: cloudRumble 2.4s ease-in-out infinite 0.4s; }
@keyframes cloudRumble {
  0%,100% { transform:translateX(0); }
  60%     { transform:translateX(-2px); }
  62%     { transform:translateX(2px); }
  64%     { transform:translateX(-1px); }
  66%     { transform:translateX(0); }
}
/* Rain drops */
.rain { animation: rainFall var(--rd) linear infinite var(--rl); }
@keyframes rainFall {
  0%   { transform:translateY(-20px); opacity:0.8; }
  100% { transform:translateY(60px);  opacity:0; }
}
/* Ground puddle ripple */
.puddle { animation: puddle 2s ease-out infinite var(--pd); opacity:0; transform-origin: center; }
@keyframes puddle {
  0%   { transform:scale(0.2); opacity:0.8; }
  100% { transform:scale(3);   opacity:0; }
}
/* Sky flash (whole scene brightens briefly) */
#skyFlash { animation: skyLight 2.4s ease-in-out infinite; opacity:0; }
@keyframes skyLight {
  0%,61%,100% { opacity:0; }
  63%          { opacity:0.15; }
  65%          { opacity:0; }
}
/* Stars (before storm) */
.star { animation: tw var(--d) ease-in-out infinite var(--dl); }
@keyframes tw { 0%,100% { opacity:0.1; } 50% { opacity:0.5; } }
/* Thunder rumble text */
#thunder { animation: thunderShow 2.4s ease-in-out infinite; opacity:0; }
@keyframes thunderShow {
  0%,67%,100% { opacity:0; transform:scale(0.8); }
  68%          { opacity:1; transform:scale(1.2); }
  72%          { opacity:0; transform:scale(1); }
}
</style></head><body>
<svg viewBox="0 0 130 130" style="overflow:hidden">
  <defs>
    <radialGradient id="skyG" cx="50%" cy="40%">
      <stop offset="0%"   stop-color="#151D35"/>
      <stop offset="100%" stop-color="#080C18"/>
    </radialGradient>
    <linearGradient id="boltG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="40%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8800"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="130" height="130" fill="url(#skyG)"/>
  <!-- Sky flash -->
  <rect id="skyFlash" x="0" y="0" width="130" height="130" fill="white"/>

  <!-- Distant stars peeking through -->
  <circle class="star" cx="10"  cy="10" r="1" fill="white" style="--d:3s;--dl:0s"/>
  <circle class="star" cx="120" cy="15" r="1" fill="white" style="--d:2.5s;--dl:0.8s"/>

  <!-- Rain (behind clouds) -->
  <line class="rain" x1="25" y1="68" x2="22" y2="78" stroke="#4A90D9" stroke-width="1.5" style="--rd:1.2s;--rl:0s"/>
  <line class="rain" x1="40" y1="68" x2="37" y2="78" stroke="#4A90D9" stroke-width="1.5" style="--rd:1.4s;--rl:0.2s"/>
  <line class="rain" x1="55" y1="68" x2="52" y2="78" stroke="#4A90D9" stroke-width="1.5" style="--rd:1.1s;--rl:0.4s"/>
  <line class="rain" x1="70" y1="68" x2="67" y2="78" stroke="#4A90D9" stroke-width="1.5" style="--rd:1.3s;--rl:0.6s"/>
  <line class="rain" x1="85" y1="68" x2="82" y2="78" stroke="#4A90D9" stroke-width="1.5" style="--rd:1.5s;--rl:0.1s"/>
  <line class="rain" x1="100" y1="68" x2="97" y2="78" stroke="#4A90D9" stroke-width="1.5" style="--rd:1.2s;--rl:0.3s"/>
  <line class="rain" x1="115" y1="68" x2="112" y2="78" stroke="#4A90D9" stroke-width="1.5" style="--rd:1.4s;--rl:0.5s"/>
  <line class="rain" x1="30" y1="75" x2="27" y2="88" stroke="#4A90D9" stroke-width="1" style="--rd:1.1s;--rl:0.7s"/>
  <line class="rain" x1="60" y1="75" x2="57" y2="88" stroke="#4A90D9" stroke-width="1" style="--rd:1.3s;--rl:0.9s"/>
  <line class="rain" x1="90" y1="75" x2="87" y2="88" stroke="#4A90D9" stroke-width="1" style="--rd:1.2s;--rl:1.1s"/>

  <!-- Ground puddles -->
  <ellipse class="puddle" cx="30"  cy="112" rx="6" ry="3" fill="none" stroke="#4A90D9" stroke-width="1" style="--pd:0s"/>
  <ellipse class="puddle" cx="65"  cy="115" rx="6" ry="3" fill="none" stroke="#4A90D9" stroke-width="1" style="--pd:0.7s"/>
  <ellipse class="puddle" cx="100" cy="112" rx="6" ry="3" fill="none" stroke="#4A90D9" stroke-width="1" style="--pd:1.4s"/>

  <!-- Ground -->
  <rect x="0" y="108" width="130" height="12" fill="#1A2030"/>

  <!-- Storm cloud 2 (back) -->
  <g id="cloud2">
    <ellipse cx="75" cy="48" rx="30" ry="16" fill="#1E2848"/>
    <ellipse cx="55" cy="52" rx="20" ry="14" fill="#1E2848"/>
    <ellipse cx="95" cy="52" rx="22" ry="13" fill="#1E2848"/>
  </g>

  <!-- Lightning bolt 2 (thinner, offset) -->
  <g id="bolt2">
    <polygon points="90,55 82,78 88,78 80,100 95,74 88,74 96,55" fill="url(#boltG)" opacity="0.7"/>
  </g>

  <!-- Main storm cloud (front) -->
  <g id="cloud">
    <ellipse cx="55" cy="44" rx="32" ry="18" fill="#1A2040"/>
    <ellipse cx="38" cy="50" rx="20" ry="15" fill="#1A2040"/>
    <ellipse cx="72" cy="50" rx="24" ry="14" fill="#1A2040"/>
    <ellipse cx="55" cy="58" rx="32" ry="12" fill="#1A2040"/>
  </g>

  <!-- Main lightning bolt 1 -->
  <g id="bolt1">
    <polygon points="60,58 50,82 57,82 46,110 65,78 58,78 68,58" fill="url(#boltG)"/>
    <!-- Inner white core -->
    <polygon points="60,58 54,76 58,76 50,98 63,72 59,72 65,58" fill="white" opacity="0.6"/>
  </g>

  <!-- Thunder text flash -->
  <text id="thunder" x="65" y="125" text-anchor="middle" font-size="10" fill="#FFD700" font-family="sans-serif">⚡ BOOM</text>
</svg>
<div class="label">Charging up your lesson…</div>
</body></html>
