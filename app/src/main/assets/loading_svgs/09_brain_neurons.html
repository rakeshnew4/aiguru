<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; }
  svg { width:160px; height:160px; }
  .label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

  /* Neuron pulse ripple */
  .node { animation: nodePulse var(--d,1.5s) ease-in-out infinite var(--dl,0s); }
  @keyframes nodePulse {
    0%,100% { r: var(--r,5); filter: drop-shadow(0 0 2px #7B52CC); }
    50%     { r: calc(var(--r,5) * 1.5); filter: drop-shadow(0 0 10px #C0A0FF); }
  }

  /* Signal pulses travel along axons */
  .pulse { animation: travelPulse var(--pd,2s) linear infinite var(--pdl,0s); }
  @keyframes travelPulse {
    0%   { opacity:0; offset-distance: 0%; }
    10%  { opacity:1; }
    90%  { opacity:1; }
    100% { opacity:0; offset-distance: 100%; }
  }

  /* Axon lines light up sequentially */
  .axon { animation: axonFire var(--ad,2s) ease-in-out infinite var(--adl,0s); stroke-opacity:0.3; }
  @keyframes axonFire {
    0%,100% { stroke-opacity:0.2; stroke:#3D1A6E; }
    50%     { stroke-opacity:1;   stroke:#B08AFF; }
  }

  /* Brain outline breathe */
  #brain_outline { animation: breathe 3s ease-in-out infinite; }
  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.03); }
  }

  /* Moving dots along paths */
  #dot1 { animation: moveDot1 2.2s linear infinite; }
  #dot2 { animation: moveDot2 1.8s linear infinite 0.5s; }
  #dot3 { animation: moveDot3 2.5s linear infinite 1.1s; }
  #dot4 { animation: moveDot4 1.6s linear infinite 0.3s; }
  #dot5 { animation: moveDot5 2.0s linear infinite 0.8s; }

  @keyframes moveDot1 {
    0%   { transform: translate(28px,35px); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:1; }
    100% { transform: translate(60px,50px); opacity:0; }
  }
  @keyframes moveDot2 {
    0%   { transform: translate(60px,50px); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:1; }
    100% { transform: translate(90px,30px); opacity:0; }
  }
  @keyframes moveDot3 {
    0%   { transform: translate(60px,50px); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:1; }
    100% { transform: translate(75px,75px); opacity:0; }
  }
  @keyframes moveDot4 {
    0%   { transform: translate(75px,75px); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:1; }
    100% { transform: translate(45px,85px); opacity:0; }
  }
  @keyframes moveDot5 {
    0%   { transform: translate(45px,85px); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:1; }
    100% { transform: translate(28px,60px); opacity:0; }
  }
</style>
</head>
<body>
<svg viewBox="0 0 120 120">
  <defs>
    <radialGradient id="nodeGrad">
      <stop offset="0%" stop-color="#C0A0FF"/>
      <stop offset="100%" stop-color="#7B52CC"/>
    </radialGradient>
    <radialGradient id="brainGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#2A1A50"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
  </defs>

  <!-- Brain silhouette -->
  <g id="brain_outline" transform-origin="60 60">
    <path d="M60,20 C75,18 92,22 96,35 C102,45 98,58 90,62 C96,68 96,80 88,86 C80,92 70,90 65,85 C62,92 55,95 48,92 C40,95 30,90 28,82 C20,78 18,66 24,58 C16,50 18,36 28,30 C36,22 48,22 60,20 Z"
          fill="url(#brainGrad)" stroke="#5B30CC" stroke-width="2"/>
    <!-- Brain folds -->
    <path d="M38,35 Q45,30 50,38 Q55,45 48,50" fill="none" stroke="#4A2DA0" stroke-width="1.5"/>
    <path d="M62,30 Q70,28 74,36 Q76,44 70,48" fill="none" stroke="#4A2DA0" stroke-width="1.5"/>
    <path d="M30,58 Q36,52 42,58 Q46,64 40,70" fill="none" stroke="#4A2DA0" stroke-width="1.5"/>
    <path d="M78,60 Q84,56 88,64 Q88,72 82,74" fill="none" stroke="#4A2DA0" stroke-width="1.5"/>
    <path d="M50,72 Q56,68 62,75 Q66,82 58,86" fill="none" stroke="#4A2DA0" stroke-width="1.5"/>
  </g>

  <!-- Axon connections (light up) -->
  <line class="axon" x1="28" y1="35" x2="60" y2="50" stroke="#7B52CC" stroke-width="1.2" style="--ad:2.2s;--adl:0s"/>
  <line class="axon" x1="60" y1="50" x2="90" y2="30" stroke="#7B52CC" stroke-width="1.2" style="--ad:1.8s;--adl:0.5s"/>
  <line class="axon" x1="60" y1="50" x2="75" y2="75" stroke="#7B52CC" stroke-width="1.2" style="--ad:2.5s;--adl:1.1s"/>
  <line class="axon" x1="75" y1="75" x2="45" y2="85" stroke="#7B52CC" stroke-width="1.2" style="--ad:1.6s;--adl:0.3s"/>
  <line class="axon" x1="45" y1="85" x2="28" y2="60" stroke="#7B52CC" stroke-width="1.2" style="--ad:2.0s;--adl:0.8s"/>
  <line class="axon" x1="28" y1="60" x2="28" y2="35" stroke="#7B52CC" stroke-width="1.2" style="--ad:2.3s;--adl:1.4s"/>
  <line class="axon" x1="90" y1="30" x2="90" y2="60" stroke="#7B52CC" stroke-width="1.2" style="--ad:1.9s;--adl:0.6s"/>
  <line class="axon" x1="90" y1="60" x2="75" y2="75" stroke="#7B52CC" stroke-width="1.2" style="--ad:2.1s;--adl:0.2s"/>

  <!-- Neuron nodes -->
  <circle class="node" cx="28" cy="35" r="5" fill="url(#nodeGrad)" style="--r:5;--d:1.8s;--dl:0s"/>
  <circle class="node" cx="60" cy="50" r="6" fill="url(#nodeGrad)" style="--r:6;--d:2.2s;--dl:0.3s"/>
  <circle class="node" cx="90" cy="30" r="4" fill="url(#nodeGrad)" style="--r:4;--d:1.5s;--dl:0.6s"/>
  <circle class="node" cx="75" cy="75" r="5" fill="url(#nodeGrad)" style="--r:5;--d:2.0s;--dl:0.9s"/>
  <circle class="node" cx="45" cy="85" r="4" fill="url(#nodeGrad)" style="--r:4;--d:1.7s;--dl:1.2s"/>
  <circle class="node" cx="28" cy="60" r="4" fill="url(#nodeGrad)" style="--r:4;--d:1.9s;--dl:0.4s"/>
  <circle class="node" cx="90" cy="60" r="4" fill="url(#nodeGrad)" style="--r:4;--d:2.1s;--dl:0.7s"/>

  <!-- Signal dots travelling along axons -->
  <circle id="dot1" r="2.5" fill="#FFD700" opacity="0"/>
  <circle id="dot2" r="2.5" fill="#FF9500" opacity="0"/>
  <circle id="dot3" r="2"   fill="#C0A0FF" opacity="0"/>
  <circle id="dot4" r="2.5" fill="#FFD700" opacity="0"/>
  <circle id="dot5" r="2"   fill="#FF9500" opacity="0"/>
</svg>
<div class="label">Firing up neurons…</div>
</body>
</html>
