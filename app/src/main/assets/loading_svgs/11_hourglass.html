<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; }
svg { width:140px; height:180px; }
.label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

#sand_top { animation: emptyTop 4s ease-in infinite; transform-origin: 60px 52px; }
@keyframes emptyTop {
  0%   { transform: scaleY(1); }
  80%  { transform: scaleY(0.05); }
  81%  { transform: scaleY(1); }
  100% { transform: scaleY(1); }
}
#sand_bot { animation: fillBot 4s ease-in infinite; transform-origin: 60px 98px; }
@keyframes fillBot {
  0%   { transform: scaleY(0.05); }
  80%  { transform: scaleY(1); }
  100% { transform: scaleY(0.05); }
}
.grain { animation: fall var(--d) linear infinite var(--dl); }
@keyframes fall {
  0%,20% { transform: translateY(0); opacity:0; }
  25%    { opacity:1; }
  75%    { opacity:1; }
  100%   { transform: translateY(36px); opacity:0; }
}
#glass_group { animation: flip 4s linear infinite; transform-origin: 60px 80px; }
@keyframes flip {
  0%,80%  { transform: rotate(0deg); }
  85%,100% { transform: rotate(180deg); }
}
.sparkle { animation: sparkle 4s ease-in-out infinite var(--sd); }
@keyframes sparkle {
  0%,78% { opacity:0; transform: scale(0); }
  82%    { opacity:1; transform: scale(1); }
  90%,100% { opacity:0; transform: scale(0); }
}
</style></head><body>
<svg viewBox="0 0 120 145">
  <defs>
    <clipPath id="topClip"><polygon points="38,18 82,18 62,62 58,62"/></clipPath>
    <clipPath id="botClip"><polygon points="58,68 62,68 82,112 38,112"/></clipPath>
    <linearGradient id="sandG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <linearGradient id="glassG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#B0D8FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <g id="glass_group">
    <!-- Frame -->
    <rect x="34" y="12" width="52" height="6" rx="3" fill="#5B30CC"/>
    <rect x="34" y="112" width="52" height="6" rx="3" fill="#5B30CC"/>
    <line x1="37" y1="15" x2="37" y2="115" stroke="#5B30CC" stroke-width="3" stroke-linecap="round"/>
    <line x1="83" y1="15" x2="83" y2="115" stroke="#5B30CC" stroke-width="3" stroke-linecap="round"/>
    <!-- Glass body -->
    <polygon points="38,18 82,18 62,62 58,62" fill="url(#glassG)" stroke="#7B52CC" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="58,68 62,68 82,112 38,112" fill="url(#glassG)" stroke="#7B52CC" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Neck -->
    <rect x="57" y="62" width="6" height="6" fill="#7B52CC" opacity="0.5"/>
    <!-- Sand top -->
    <g clip-path="url(#topClip)">
      <polygon id="sand_top" points="38,18 82,18 62,62 58,62" fill="url(#sandG)" opacity="0.9"/>
    </g>
    <!-- Sand bottom -->
    <g clip-path="url(#botClip)">
      <polygon id="sand_bot" points="58,68 62,68 82,112 38,112" fill="url(#sandG)" opacity="0.9"/>
    </g>
    <!-- Falling grains -->
    <circle class="grain" cx="59" cy="62" r="1.5" fill="#FFD700" style="--d:0.3s;--dl:0.1s"/>
    <circle class="grain" cx="61" cy="62" r="1.5" fill="#FFA500" style="--d:0.3s;--dl:0.2s"/>
    <circle class="grain" cx="60" cy="62" r="1"   fill="#FFD700" style="--d:0.3s;--dl:0.35s"/>
    <!-- Sparkles on flip -->
    <text class="sparkle" x="25" y="75" font-size="12" fill="#FFD700" style="--sd:0.5s">✦</text>
    <text class="sparkle" x="86" y="70" font-size="10" fill="#FFA500" style="--sd:0.7s">★</text>
    <text class="sparkle" x="20" y="85" font-size="8"  fill="#FFD700" style="--sd:0.9s">✦</text>
  </g>
</svg>
<div class="label">Time is ticking…</div>
</body></html>
