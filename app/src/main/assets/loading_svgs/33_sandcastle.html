<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; overflow:hidden; }
svg { width:155px; height:165px; }
.label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

.block { animation: place var(--d) ease-out forwards var(--dl); opacity:0; transform:translateY(-30px); }
@keyframes place {
  0%   { opacity:0; transform:translateY(-30px); }
  60%  { opacity:1; transform:translateY(2px); }
  80%  { transform:translateY(-1px); }
  100% { opacity:1; transform:translateY(0); }
}
.wave { animation: waveSway 3s ease-in-out infinite; transform-origin:60px 118px; }
@keyframes waveSway {
  0%,100% { transform:scaleX(1) translateX(0); }
  50%     { transform:scaleX(0.97) translateX(3px); }
}
.flag { animation: flagWave 1s ease-in-out infinite; transform-origin:60px 35px; }
@keyframes flagWave { 0%,100% { transform:skewY(0deg); } 50% { transform:skewY(5deg); } }
.sparkle { animation: sp var(--d) ease-in-out infinite var(--dl); }
@keyframes sp { 0%,100% { opacity:0; transform:scale(0); } 50% { opacity:1; transform:scale(1); } }
</style></head><body>
<svg viewBox="0 0 120 130">
  <defs>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C8A050"/>
      <stop offset="100%" stop-color="#9A7030"/>
    </linearGradient>
    <linearGradient id="beach" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C8A050"/>
      <stop offset="100%" stop-color="#A88040"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0A3A6A"/>
      <stop offset="100%" stop-color="#1A5A8A"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0A1828"/>
      <stop offset="100%" stop-color="#1A2A40"/>
    </linearGradient>
  </defs>

  <rect width="120" height="130" fill="url(#sky)"/>

  <!-- Stars in sky -->
  <circle cx="20" cy="15" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="50" cy="10" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="90" cy="18" r="0.9" fill="white" opacity="0.7"/>
  <circle cx="108" cy="8" r="0.7" fill="white" opacity="0.5"/>

  <!-- Sea -->
  <g class="wave">
    <rect x="0" y="105" width="120" height="25" fill="url(#sea)"/>
    <ellipse cx="30"  cy="105" rx="20" ry="4" fill="#1A5A8A"/>
    <ellipse cx="80"  cy="105" rx="25" ry="4" fill="#1A5A8A"/>
    <ellipse cx="55"  cy="108" rx="18" ry="3" fill="#0A4A7A"/>
  </g>

  <!-- Beach sand base -->
  <ellipse cx="60" cy="110" rx="58" ry="12" fill="url(#beach)"/>

  <!-- Sandcastle — blocks appear one by one -->
  <!-- Base level -->
  <g class="block" style="--d:0.4s;--dl:0.2s">
    <rect x="30" y="88" width="60" height="18" rx="2" fill="url(#sand)"/>
    <rect x="30" y="86" width="12" height="6" rx="1" fill="url(#sand)"/>
    <rect x="54" y="86" width="12" height="6" rx="1" fill="url(#sand)"/>
    <rect x="78" y="86" width="12" height="6" rx="1" fill="url(#sand)"/>
  </g>
  <!-- Middle level -->
  <g class="block" style="--d:0.4s;--dl:0.7s">
    <rect x="40" y="72" width="40" height="18" rx="2" fill="url(#sand)"/>
    <rect x="40" y="70" width="10" height="5" rx="1" fill="url(#sand)"/>
    <rect x="62" y="70" width="10" height="5" rx="1" fill="url(#sand)"/>
  </g>
  <!-- Top level -->
  <g class="block" style="--d:0.4s;--dl:1.2s">
    <rect x="48" y="58" width="24" height="16" rx="2" fill="url(#sand)"/>
    <rect x="48" y="56" width="8"  height="5" rx="1" fill="url(#sand)"/>
    <rect x="64" y="56" width="8"  height="5" rx="1" fill="url(#sand)"/>
  </g>
  <!-- Turret top -->
  <g class="block" style="--d:0.4s;--dl:1.7s">
    <ellipse cx="60" cy="56" rx="10" ry="5" fill="#D4A855"/>
    <rect x="55" y="35" width="10" height="22" rx="2" fill="url(#sand)"/>
    <!-- Flag -->
    <g class="flag">
      <line x1="60" y1="35" x2="60" y2="22" stroke="#8A6020" stroke-width="1.5"/>
      <polygon points="60,22 76,28 60,34" fill="#FF4444"/>
    </g>
  </g>

  <!-- Shell decorations -->
  <ellipse class="sparkle" cx="40" cy="97" rx="3" ry="2" fill="#F0E0C0" style="--d:3s;--dl:2.5s"/>
  <ellipse class="sparkle" cx="80" cy="97" rx="3" ry="2" fill="#F0E0C0" style="--d:3s;--dl:2.8s"/>
  <circle  class="sparkle" cx="35" cy="100" r="2" fill="#FF8888" style="--d:3s;--dl:3.1s"/>
</svg>
<div class="label">Building block by block…</div>
</body></html>
