<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; }
svg { width:160px; height:160px; }
.label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

/* Wave source 1 rings expand from left point */
.w1 { animation: expand1 2s ease-out infinite var(--d); opacity:0; transform-origin: 35px 75px; }
@keyframes expand1 {
  0%   { transform:scale(0); opacity:0.9; }
  100% { transform:scale(4); opacity:0; }
}
/* Wave source 2 rings from right */
.w2 { animation: expand2 2s ease-out infinite var(--d); opacity:0; transform-origin: 95px 75px; }
@keyframes expand2 {
  0%   { transform:scale(0); opacity:0.9; }
  100% { transform:scale(4); opacity:0; }
}
/* Interference pattern dots — brighten/darken based on constructive/destructive */
.node { animation: nodeShimmer var(--nd) ease-in-out infinite var(--no); }
@keyframes nodeShimmer {
  0%,100% { opacity:0.2; r:2; }
  50%     { opacity:1;   r:3.5; }
}
.antinode { animation: antinodeShimmer var(--ad) ease-in-out infinite var(--ao); }
@keyframes antinodeShimmer {
  0%,100% { opacity:0.8; r:2.5; }
  50%     { opacity:0.1; r:1; }
}
/* Source glow */
#s1 { animation: srcPulse 2s ease-in-out infinite; }
#s2 { animation: srcPulse 2s ease-in-out infinite 0.3s; }
@keyframes srcPulse {
  0%,100% { r:6; filter:drop-shadow(0 0 3px #4ECDC4); }
  50%     { r:8; filter:drop-shadow(0 0 10px #4ECDC4); }
}
/* Stars */
.star { animation: tw var(--td) ease-in-out infinite var(--tl); }
@keyframes tw { 0%,100% { opacity:0.2; } 50% { opacity:0.8; } }
</style></head><body>
<svg viewBox="0 0 130 120">
  <defs>
    <radialGradient id="srcG"><stop offset="0%" stop-color="#4ECDC4"/><stop offset="100%" stop-color="#1A7A75"/></radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="130" height="120" fill="#080D18"/>
  <circle class="star" cx="10"  cy="8"  r="1" fill="white" style="--td:2s;--tl:0s"/>
  <circle class="star" cx="120" cy="12" r="1" fill="white" style="--td:1.8s;--tl:0.5s"/>
  <circle class="star" cx="65"  cy="4"  r="1" fill="white" style="--td:2.3s;--tl:1s"/>

  <!-- Source 1 wave rings (teal) -->
  <circle class="w1" cx="35" cy="75" r="12" fill="none" stroke="#4ECDC4" stroke-width="1.5" style="--d:0s"/>
  <circle class="w1" cx="35" cy="75" r="12" fill="none" stroke="#4ECDC4" stroke-width="1.2" style="--d:0.5s"/>
  <circle class="w1" cx="35" cy="75" r="12" fill="none" stroke="#4ECDC4" stroke-width="1" style="--d:1s"/>
  <circle class="w1" cx="35" cy="75" r="12" fill="none" stroke="#4ECDC4" stroke-width="0.8" style="--d:1.5s"/>

  <!-- Source 2 wave rings (purple) -->
  <circle class="w2" cx="95" cy="75" r="12" fill="none" stroke="#9B70FF" stroke-width="1.5" style="--d:0s"/>
  <circle class="w2" cx="95" cy="75" r="12" fill="none" stroke="#9B70FF" stroke-width="1.2" style="--d:0.5s"/>
  <circle class="w2" cx="95" cy="75" r="12" fill="none" stroke="#9B70FF" stroke-width="1" style="--d:1s"/>
  <circle class="w2" cx="95" cy="75" r="12" fill="none" stroke="#9B70FF" stroke-width="0.8" style="--d:1.5s"/>

  <!-- Constructive interference nodes (bright dots in middle) -->
  <!-- Antinodal lines approximately at x=65 (midline) -->
  <circle class="node" cx="65" cy="20" r="2" fill="#FFD700" style="--nd:0.8s;--no:0s"/>
  <circle class="node" cx="65" cy="35" r="2" fill="#FFD700" style="--nd:0.9s;--no:0.15s"/>
  <circle class="node" cx="65" cy="50" r="2" fill="#FFD700" style="--nd:0.7s;--no:0.3s"/>
  <circle class="node" cx="65" cy="65" r="2" fill="#FFD700" style="--nd:0.85s;--no:0.45s"/>
  <circle class="node" cx="65" cy="80" r="2" fill="#FFD700" style="--nd:0.75s;--no:0.1s"/>
  <circle class="node" cx="65" cy="95" r="2" fill="#FFD700" style="--nd:0.95s;--no:0.25s"/>

  <!-- Left-of-center nodes -->
  <circle class="node" cx="48" cy="28" r="1.5" fill="#FF9040" style="--nd:1.1s;--no:0.2s"/>
  <circle class="node" cx="48" cy="55" r="1.5" fill="#FF9040" style="--nd:1.0s;--no:0.4s"/>
  <circle class="node" cx="48" cy="82" r="1.5" fill="#FF9040" style="--nd:1.2s;--no:0.6s"/>
  <!-- Right-of-center -->
  <circle class="node" cx="82" cy="28" r="1.5" fill="#FF9040" style="--nd:1.1s;--no:0.35s"/>
  <circle class="node" cx="82" cy="55" r="1.5" fill="#FF9040" style="--nd:1.0s;--no:0.55s"/>
  <circle class="node" cx="82" cy="82" r="1.5" fill="#FF9040" style="--nd:1.2s;--no:0.15s"/>

  <!-- Destructive nodes (anti-nodes, dim) -->
  <circle class="antinode" cx="55" cy="42" r="2.5" fill="#3A2060" style="--ad:0.9s;--ao:0s"/>
  <circle class="antinode" cx="75" cy="42" r="2.5" fill="#3A2060" style="--ad:0.8s;--ao:0.3s"/>
  <circle class="antinode" cx="55" cy="68" r="2.5" fill="#3A2060" style="--ad:1.0s;--ao:0.15s"/>
  <circle class="antinode" cx="75" cy="68" r="2.5" fill="#3A2060" style="--ad:0.85s;--ao:0.45s"/>

  <!-- Centre interference axis line -->
  <line x1="65" y1="10" x2="65" y2="108" stroke="#FFD700" stroke-width="0.6" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Sources -->
  <circle id="s1" cx="35" cy="75" r="6" fill="url(#srcG)"/>
  <text x="33" y="78" font-size="7" fill="white" font-family="sans-serif">S₁</text>
  <circle id="s2" cx="95" cy="75" r="6" fill="#7B52CC"/>
  <text x="93" y="78" font-size="7" fill="white" font-family="sans-serif">S₂</text>

  <!-- Legend -->
  <text x="65" y="114" text-anchor="middle" font-size="7" fill="#4A5070" font-family="sans-serif">⚡ constructive · ◦ destructive</text>
</svg>
<div class="label">Waves of knowledge interfering…</div>
</body></html>
