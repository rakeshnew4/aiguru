<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; overflow:hidden; }
  svg { width:150px; height:180px; }
  .label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

  #rocket_group { animation: launch 4s cubic-bezier(.2,.8,.4,1) infinite; transform-origin: center bottom; }
  @keyframes launch {
    0%   { transform: translateY(0);    opacity:1; }
    60%  { transform: translateY(-90px); opacity:1; }
    61%  { opacity:0; transform: translateY(-90px); }
    80%  { opacity:0; transform: translateY(60px); }
    81%  { opacity:1; transform: translateY(60px); }
    100% { transform: translateY(0);    opacity:1; }
  }
  #flame1 { animation: flicker 0.12s linear infinite alternate; transform-origin: center top; }
  #flame2 { animation: flicker2 0.18s linear infinite alternate; transform-origin: center top; }
  @keyframes flicker {
    from { transform: scaleX(0.8) scaleY(0.9); }
    to   { transform: scaleX(1.2) scaleY(1.1); }
  }
  @keyframes flicker2 {
    from { transform: scaleX(1.1) scaleY(1.2); opacity:0.7; }
    to   { transform: scaleX(0.8) scaleY(0.85); opacity:1; }
  }
  .star { animation: twinkle var(--d, 2s) ease-in-out infinite var(--delay, 0s); }
  @keyframes twinkle {
    0%,100% { opacity:0.2; r:1; }
    50%     { opacity:1;   r:2; }
  }
  #trail1 { animation: trail 4s ease-out infinite; }
  #trail2 { animation: trail 4s ease-out infinite 0.2s; }
  #trail3 { animation: trail 4s ease-out infinite 0.4s; }
  @keyframes trail {
    0%   { opacity:0.8; transform: scaleY(0.2); transform-origin: top center; }
    50%  { opacity:0.3; transform: scaleY(1); }
    100% { opacity:0; }
  }
  #earth { animation: earthRot 12s linear infinite; transform-origin: 60px 148px; }
  @keyframes earthRot { from { } to { transform: rotate(360deg); } }
</style>
</head>
<body>
<svg viewBox="0 0 120 170">
  <defs>
    <radialGradient id="flameGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF2200" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rocketGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#B08AFF"/>
      <stop offset="100%" stop-color="#5B30CC"/>
    </radialGradient>
    <linearGradient id="earthGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A6BE0"/>
      <stop offset="60%" stop-color="#1A9E30"/>
      <stop offset="100%" stop-color="#1A6BE0"/>
    </linearGradient>
  </defs>

  <!-- Stars -->
  <circle class="star" cx="10"  cy="15"  r="1" fill="white" style="--d:1.8s; --delay:0s"/>
  <circle class="star" cx="95"  cy="8"   r="1" fill="white" style="--d:2.3s; --delay:0.4s"/>
  <circle class="star" cx="105" cy="40"  r="1" fill="white" style="--d:1.5s; --delay:0.8s"/>
  <circle class="star" cx="8"   cy="55"  r="1" fill="white" style="--d:2.1s; --delay:0.2s"/>
  <circle class="star" cx="112" cy="70"  r="1" fill="white" style="--d:1.9s; --delay:1.1s"/>
  <circle class="star" cx="18"  cy="80"  r="1" fill="white" style="--d:2.4s; --delay:0.6s"/>
  <circle class="star" cx="100" cy="95"  r="1" fill="white" style="--d:1.6s; --delay:1.3s"/>
  <circle class="star" cx="5"   cy="105" r="1" fill="white" style="--d:2.0s; --delay:0.9s"/>

  <!-- Earth at bottom -->
  <circle id="earth" cx="60" cy="148" r="18" fill="url(#earthGrad)" opacity="0.9"/>
  <ellipse cx="60" cy="148" rx="18" ry="18" fill="none" stroke="#4A90D9" stroke-width="0.5" opacity="0.5"/>
  <!-- cloud-like shapes on earth -->
  <ellipse cx="54" cy="144" rx="5" ry="2" fill="#2ADE50" opacity="0.4"/>
  <ellipse cx="66" cy="151" rx="4" ry="1.5" fill="#2ADE50" opacity="0.4"/>

  <!-- Rocket group -->
  <g id="rocket_group">
    <!-- Exhaust trails -->
    <rect id="trail1" x="56" y="105" width="4" height="18" rx="2" fill="#FF6B00" opacity="0.7"/>
    <rect id="trail2" x="59" y="105" width="3" height="24" rx="1.5" fill="#FFD700" opacity="0.5"/>
    <rect id="trail3" x="53" y="105" width="5" height="14" rx="2.5" fill="#FF4400" opacity="0.4"/>

    <!-- Flames -->
    <ellipse id="flame2" cx="60" cy="107" rx="8" ry="12" fill="url(#flameGrad)"/>
    <ellipse id="flame1" cx="60" cy="105" rx="5" ry="8"  fill="#FFD700" opacity="0.9"/>

    <!-- Rocket body -->
    <rect x="50" y="72" width="20" height="34" rx="4" fill="url(#rocketGrad)"/>
    <!-- Window -->
    <circle cx="60" cy="82" r="5" fill="#1A2540" stroke="#7BD8FF" stroke-width="1.5"/>
    <circle cx="60" cy="82" r="2" fill="#3D9FFF" opacity="0.7"/>
    <!-- Fins -->
    <polygon points="50,96 44,108 50,106" fill="#7B52CC"/>
    <polygon points="70,96 76,108 70,106" fill="#7B52CC"/>
    <!-- Nose cone -->
    <polygon points="50,72 70,72 60,52" fill="#C0A0FF"/>
  </g>
</svg>
<div class="label">Launching your lesson…</div>
</body>
</html>
