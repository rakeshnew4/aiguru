<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; }
  svg { width:160px; height:160px; }
  .label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

  /* Stars twinkle */
  .star { animation: twinkle var(--d) ease-in-out infinite var(--delay); }
  @keyframes twinkle {
    0%,100% { opacity:0.2; transform:scale(0.7); }
    50%     { opacity:1;   transform:scale(1.3); }
  }

  /* Lines draw in sequentially */
  .cline { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1s ease forwards; animation-delay: var(--ld); }
  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }

  /* Whole constellation fades out and redraws */
  #constellation { animation: constellationLoop 7s linear infinite; }
  @keyframes constellationLoop {
    0%,80%  { opacity:1; }
    85%,99% { opacity:0; }
    100%    { opacity:1; }
  }

  /* Shooting star */
  #shoot { animation: shoot 5s linear infinite 1s; }
  @keyframes shoot {
    0%   { transform: translate(0,0);     opacity:0; }
    2%   { opacity:1; }
    12%  { transform: translate(-90px,50px); opacity:0; }
    100% { opacity:0; }
  }
  /* Glow pulse on star dots */
  .glow { animation: glow 2s ease-in-out infinite var(--gd); }
  @keyframes glow {
    0%,100% { filter: drop-shadow(0 0 2px #7B52CC); }
    50%     { filter: drop-shadow(0 0 8px #C0A0FF); }
  }
</style>
</head>
<body>
<svg viewBox="0 0 120 120">
  <defs>
    <radialGradient id="starGrad">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#C0A0FF"/>
    </radialGradient>
  </defs>

  <!-- Background stars (random, twinkling) -->
  <circle class="star" cx="5"   cy="10"  r="1"   fill="white" style="--d:1.8s; --delay:0s"/>
  <circle class="star" cx="115" cy="5"   r="0.8" fill="white" style="--d:2.3s; --delay:0.4s"/>
  <circle class="star" cx="110" cy="30"  r="1"   fill="white" style="--d:1.5s; --delay:0.8s"/>
  <circle class="star" cx="8"   cy="40"  r="0.8" fill="white" style="--d:2.1s; --delay:0.2s"/>
  <circle class="star" cx="115" cy="80"  r="1"   fill="white" style="--d:1.9s; --delay:1.1s"/>
  <circle class="star" cx="3"   cy="90"  r="0.8" fill="white" style="--d:2.4s; --delay:0.6s"/>
  <circle class="star" cx="112" cy="110" r="1"   fill="white" style="--d:1.6s; --delay:1.3s"/>
  <circle class="star" cx="10"  cy="115" r="0.8" fill="white" style="--d:2.0s; --delay:0.9s"/>
  <circle class="star" cx="60"  cy="3"   r="0.8" fill="white" style="--d:2.2s; --delay:0.5s"/>
  <circle class="star" cx="90"  cy="115" r="1"   fill="white" style="--d:1.7s; --delay:1.5s"/>

  <!-- Shooting star -->
  <line id="shoot" x1="110" y1="10" x2="130" y2="5" stroke="white" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>

  <!-- Constellation (Orion-ish) -->
  <g id="constellation">
    <!-- Connection lines -->
    <line class="cline" x1="35" y1="25" x2="55" y2="45" stroke="#7B52CC" stroke-width="1.2" style="--ld:0.3s"/>
    <line class="cline" x1="55" y1="45" x2="80" y2="30" stroke="#7B52CC" stroke-width="1.2" style="--ld:0.8s"/>
    <line class="cline" x1="80" y1="30" x2="90" y2="55" stroke="#7B52CC" stroke-width="1.2" style="--ld:1.3s"/>
    <line class="cline" x1="55" y1="45" x2="50" y2="70" stroke="#7B52CC" stroke-width="1.2" style="--ld:1.8s"/>
    <line class="cline" x1="50" y1="70" x2="75" y2="75" stroke="#7B52CC" stroke-width="1.2" style="--ld:2.3s"/>
    <line class="cline" x1="75" y1="75" x2="90" y2="55" stroke="#7B52CC" stroke-width="1.2" style="--ld:2.8s"/>
    <line class="cline" x1="50" y1="70" x2="40" y2="95" stroke="#7B52CC" stroke-width="1.2" style="--ld:3.3s"/>
    <line class="cline" x1="75" y1="75" x2="80" y2="100" stroke="#7B52CC" stroke-width="1.2" style="--ld:3.8s"/>

    <!-- Star dots (constellation nodes) -->
    <circle class="glow" cx="35" cy="25"  r="3.5" fill="url(#starGrad)" style="--gd:0.3s"/>
    <circle class="glow" cx="55" cy="45"  r="4"   fill="url(#starGrad)" style="--gd:0.8s"/>
    <circle class="glow" cx="80" cy="30"  r="3"   fill="url(#starGrad)" style="--gd:1.3s"/>
    <circle class="glow" cx="90" cy="55"  r="3.5" fill="url(#starGrad)" style="--gd:1.8s"/>
    <circle class="glow" cx="50" cy="70"  r="3"   fill="url(#starGrad)" style="--gd:2.3s"/>
    <circle class="glow" cx="75" cy="75"  r="3"   fill="url(#starGrad)" style="--gd:2.8s"/>
    <circle class="glow" cx="40" cy="95"  r="2.5" fill="url(#starGrad)" style="--gd:3.3s"/>
    <circle class="glow" cx="80" cy="100" r="2.5" fill="url(#starGrad)" style="--gd:3.8s"/>
  </g>
</svg>
<div class="label">Connecting the dots…</div>
</body>
</html>
