<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; overflow:hidden; }
svg { width:155px; height:165px; }
.label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

#chrysalis { animation: crack 3s ease-in-out forwards; }
@keyframes crack {
  0%,60% { opacity:1; transform:scaleY(1); }
  80%     { opacity:0.5; transform:scaleY(1.1); }
  100%    { opacity:0; transform:scaleY(0); }
}
#butterfly { animation: emerge 3s ease-in-out forwards; transform-origin:60px 65px; }
@keyframes emerge {
  0%,50%  { opacity:0; transform:scale(0.1) translateY(20px); }
  70%     { opacity:1; transform:scale(0.7) translateY(5px); }
  100%    { opacity:1; transform:scale(1) translateY(0); }
}
#wingleft  { animation: flapL 0.4s ease-in-out infinite 3s; transform-origin:60px 65px; }
#wingright { animation: flapR 0.4s ease-in-out infinite 3s; transform-origin:60px 65px; }
@keyframes flapL { 0%,100% { transform:scaleX(1); } 50% { transform:scaleX(0.3); } }
@keyframes flapR { 0%,100% { transform:scaleX(1); } 50% { transform:scaleX(0.3); } }
#flutter { animation: fly 3s ease-in-out infinite 3.5s; transform-origin:60px 65px; }
@keyframes fly {
  0%,100% { transform:translateY(0) rotate(0deg); }
  25%     { transform:translateY(-15px) rotate(-3deg); }
  75%     { transform:translateY(-8px) rotate(3deg); }
}
.dot { animation: tw var(--d) ease-in-out infinite var(--dl); }
@keyframes tw { 0%,100% { opacity:0.3; } 50% { opacity:1; } }
</style></head><body>
<svg viewBox="0 0 120 130">
  <defs>
    <radialGradient id="bg">
      <stop offset="0%"   stop-color="#0F1A2A"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
    <radialGradient id="wL" cx="70%" cy="40%">
      <stop offset="0%"   stop-color="#FF88FF"/>
      <stop offset="50%"  stop-color="#8833FF"/>
      <stop offset="100%" stop-color="#220044"/>
    </radialGradient>
    <radialGradient id="wR" cx="30%" cy="40%">
      <stop offset="0%"   stop-color="#FF88FF"/>
      <stop offset="50%"  stop-color="#8833FF"/>
      <stop offset="100%" stop-color="#220044"/>
    </radialGradient>
  </defs>

  <rect width="120" height="130" fill="url(#bg)"/>

  <!-- Sparkle dots -->
  <circle class="dot" cx="15"  cy="20" r="1.5" fill="#CC88FF" style="--d:1.8s;--dl:0s"/>
  <circle class="dot" cx="105" cy="15" r="1"   fill="#88FFCC" style="--d:2.2s;--dl:0.4s"/>
  <circle class="dot" cx="20"  cy="90" r="1.2" fill="#FF88CC" style="--d:1.5s;--dl:0.8s"/>
  <circle class="dot" cx="100" cy="95" r="1.5" fill="#CC88FF" style="--d:2.0s;--dl:0.2s"/>

  <!-- Branch -->
  <line x1="20" y1="90" x2="100" y2="90" stroke="#3A4A30" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="90" x2="55"  y2="100" stroke="#2A3A20" stroke-width="3" stroke-linecap="round"/>

  <!-- Chrysalis -->
  <g id="chrysalis">
    <ellipse cx="60" cy="68" rx="10" ry="22" fill="#2A3A1A" stroke="#4A6A2A" stroke-width="1.5"/>
    <ellipse cx="60" cy="60" rx="7"  ry="10" fill="#3A5A2A"/>
    <line x1="52" y1="60" x2="68" y2="68" stroke="#5A8A3A" stroke-width="0.8" opacity="0.6"/>
    <line x1="52" y1="68" x2="68" y2="60" stroke="#5A8A3A" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Butterfly (emerges after chrysalis fades) -->
  <g id="butterfly">
    <g id="flutter">
      <!-- Left wings -->
      <g id="wingleft">
        <ellipse cx="42" cy="58" rx="18" ry="14" fill="url(#wL)" opacity="0.95"/>
        <ellipse cx="45" cy="72" rx="12" ry="9"  fill="url(#wL)" opacity="0.8"/>
        <circle cx="46" cy="56" r="3" fill="#FFD700" opacity="0.6"/>
        <circle cx="39" cy="62" r="2" fill="#FF88FF" opacity="0.5"/>
      </g>
      <!-- Right wings -->
      <g id="wingright">
        <ellipse cx="78" cy="58" rx="18" ry="14" fill="url(#wR)" opacity="0.95"/>
        <ellipse cx="75" cy="72" rx="12" ry="9"  fill="url(#wR)" opacity="0.8"/>
        <circle cx="74" cy="56" r="3" fill="#FFD700" opacity="0.6"/>
        <circle cx="81" cy="62" r="2" fill="#FF88FF" opacity="0.5"/>
      </g>
      <!-- Body -->
      <ellipse cx="60" cy="65" rx="3" ry="12" fill="#220033"/>
      <!-- Antennae -->
      <line x1="59" y1="54" x2="50" y2="44" stroke="#8833FF" stroke-width="1"/>
      <circle cx="50" cy="44" r="2" fill="#FF88FF"/>
      <line x1="61" y1="54" x2="70" y2="44" stroke="#8833FF" stroke-width="1"/>
      <circle cx="70" cy="44" r="2" fill="#FF88FF"/>
    </g>
  </g>

  <!-- Leaf under branch -->
  <ellipse cx="85" cy="93" rx="10" ry="4" fill="#2A4A1A" transform="rotate(-10 85 93)"/>
</svg>
<div class="label">Transforming ideas for you…</div>
</body></html>
