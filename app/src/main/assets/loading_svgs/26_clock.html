<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; }
svg { width:160px; height:160px; }
.label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

/* Second hand sweeps */
#secondHand { animation: secondSweep 60s linear infinite; transform-origin: 60px 60px; }
@keyframes secondSweep { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
/* Minute hand (faster for visual) */
#minuteHand { animation: minuteSweep 10s linear infinite; transform-origin: 60px 60px; }
@keyframes minuteSweep { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
/* Hour hand even faster for visual effect */
#hourHand { animation: hourSweep 30s linear infinite; transform-origin: 60px 60px; }
@keyframes hourSweep { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

/* Tick marks flash on second hand pass */
.tick { animation: tickFlash 1s ease-in-out infinite var(--td); }
@keyframes tickFlash {
  0%,80%,100% { stroke:#3A4060; }
  85%,95%     { stroke:#FFD700; filter:drop-shadow(0 0 3px #FFD700); }
}

/* Clock face glow */
#face { animation: faceGlow 5s ease-in-out infinite; }
@keyframes faceGlow {
  0%,100% { filter:drop-shadow(0 0 4px #3D1A6E); }
  50%     { filter:drop-shadow(0 0 10px #7B52CC); }
}

/* Pendulum (decorative) swings */
#pendulum { animation: pendulumSwing 1.2s ease-in-out infinite; transform-origin: 60px 115px; }
@keyframes pendulumSwing {
  0%,100% { transform:rotate(-20deg); }
  50%     { transform:rotate(20deg); }
}

/* Hour number highlight */
.num { font-family:sans-serif; fill:#5A6080; font-size:8px; }
.numHighlight { animation: numGlow 60s linear infinite var(--nh); }
@keyframes numGlow {
  0%,4%,100% { fill:#FFD700; }
  5%,99%     { fill:#5A6080; }
}

/* Stars */
.star { animation: tw var(--d) ease-in-out infinite var(--dl); }
@keyframes tw { 0%,100% { opacity:0.2; } 50% { opacity:0.9; } }
</style></head><body>
<svg viewBox="0 0 120 140">
  <defs>
    <radialGradient id="faceG">
      <stop offset="0%"   stop-color="#1E2A50"/>
      <stop offset="100%" stop-color="#0D1535"/>
    </radialGradient>
    <linearGradient id="caseG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5B3A9A"/>
      <stop offset="100%" stop-color="#2A1A50"/>
    </linearGradient>
  </defs>

  <!-- Stars background -->
  <circle class="star" cx="8"   cy="10" r="1" fill="white" style="--d:2s;--dl:0s"/>
  <circle class="star" cx="112" cy="8"  r="1" fill="white" style="--d:2.3s;--dl:0.5s"/>
  <circle class="star" cx="60"  cy="5"  r="1" fill="white" style="--d:1.8s;--dl:1s"/>

  <!-- Clock case -->
  <circle cx="60" cy="60" r="54" fill="url(#caseG)" stroke="#7B52CC" stroke-width="2"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#5B3A9A" stroke-width="1" opacity="0.6"/>

  <!-- Clock face -->
  <circle id="face" cx="60" cy="60" r="48" fill="url(#faceG)"/>

  <!-- Tick marks (60 marks, show 12 major + some minor) -->
  <!-- Major hour ticks -->
  <line x1="60" y1="14" x2="60" y2="22"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round"/><!-- 12 -->
  <line x1="84" y1="20" x2="80" y2="27"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round" transform="rotate(30,60,60)"/>
  <line x1="84" y1="20" x2="80" y2="27"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round" transform="rotate(60,60,60)"/>
  <line x1="60" y1="14" x2="60" y2="22"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round" transform="rotate(90,60,60)"/>
  <line x1="60" y1="14" x2="60" y2="22"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round" transform="rotate(120,60,60)"/>
  <line x1="60" y1="14" x2="60" y2="22"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round" transform="rotate(150,60,60)"/>
  <line x1="60" y1="14" x2="60" y2="22"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round" transform="rotate(180,60,60)"/>
  <line x1="60" y1="14" x2="60" y2="22"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round" transform="rotate(210,60,60)"/>
  <line x1="60" y1="14" x2="60" y2="22"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round" transform="rotate(240,60,60)"/>
  <line x1="60" y1="14" x2="60" y2="22"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round" transform="rotate(270,60,60)"/>
  <line x1="60" y1="14" x2="60" y2="22"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round" transform="rotate(300,60,60)"/>
  <line x1="60" y1="14" x2="60" y2="22"   stroke="#7B52CC" stroke-width="2" stroke-linecap="round" transform="rotate(330,60,60)"/>

  <!-- Hour numbers -->
  <text class="num" x="57"  y="30"  >12</text>
  <text class="num" x="88"  y="65"  >3</text>
  <text class="num" x="57"  y="98"  >6</text>
  <text class="num" x="24"  y="65"  >9</text>

  <!-- Hour hand -->
  <line id="hourHand" x1="60" y1="60" x2="60" y2="35" stroke="#C0A0FF" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line id="minuteHand" x1="60" y1="60" x2="60" y2="22" stroke="#9B70FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Second hand (red thin) -->
  <line id="secondHand" x1="60" y1="70" x2="60" y2="16" stroke="#FF4444" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Centre pin -->
  <circle cx="60" cy="60" r="4" fill="#FFD700"/>
  <circle cx="60" cy="60" r="2" fill="#AA8800"/>

  <!-- Pendulum -->
  <g id="pendulum">
    <line x1="60" y1="108" x2="60" y2="130" stroke="#7B52CC" stroke-width="2"/>
    <circle cx="60" cy="132" r="8" fill="#5B3A9A" stroke="#7B52CC" stroke-width="1.5"/>
    <circle cx="60" cy="132" r="5" fill="#4A2DA0"/>
    <ellipse cx="58" cy="130" rx="2" ry="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Crown/winder at top -->
  <rect x="55" y="8" width="10" height="5" rx="2.5" fill="#5B3A9A" stroke="#7B52CC" stroke-width="1"/>
</svg>
<div class="label">Every second counts…</div>
</body></html>
