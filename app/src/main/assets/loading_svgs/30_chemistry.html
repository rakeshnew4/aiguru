<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; overflow:hidden; }
svg { width:155px; height:165px; }
.label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

.bubble { animation: rise var(--d) ease-in infinite var(--dl); opacity:0; }
@keyframes rise {
  0%   { transform:translate(0,0) scale(0.5); opacity:0; }
  10%  { opacity:0.8; }
  90%  { opacity:0.6; }
  100% { transform:translate(var(--bx),var(--by)) scale(1); opacity:0; }
}
#liquid { animation: slosh 2s ease-in-out infinite; transform-origin:60px 80px; }
@keyframes slosh {
  0%,100% { transform:skewX(0deg); }
  25%     { transform:skewX(3deg); }
  75%     { transform:skewX(-3deg); }
}
#flame { animation: flicker 0.3s ease-in-out infinite; transform-origin:60px 108px; }
@keyframes flicker {
  0%,100% { transform:scaleX(1) scaleY(1); }
  33%     { transform:scaleX(1.1) scaleY(1.05); }
  66%     { transform:scaleX(0.9) scaleY(0.95); }
}
#steam1 { animation: steamUp 2s ease-out infinite 0s; opacity:0; }
#steam2 { animation: steamUp 2s ease-out infinite 0.7s; opacity:0; }
#steam3 { animation: steamUp 2s ease-out infinite 1.4s; opacity:0; }
@keyframes steamUp {
  0%   { transform:translateY(0) scaleX(1); opacity:0; }
  15%  { opacity:0.5; }
  100% { transform:translateY(-28px) scaleX(2); opacity:0; }
}
#glow { animation: beakerGlow 1.5s ease-in-out infinite; }
@keyframes beakerGlow { 0%,100% { opacity:0.3; } 50% { opacity:0.7; } }
</style></head><body>
<svg viewBox="0 0 120 130">
  <defs>
    <linearGradient id="liq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00FFAA"/>
      <stop offset="100%" stop-color="#008844"/>
    </linearGradient>
    <linearGradient id="beaker" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1A3A4A"/>
      <stop offset="100%" stop-color="#0A2030"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#FF4400"/>
      <stop offset="50%"  stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#FFE000"/>
    </linearGradient>
  </defs>

  <!-- Table surface -->
  <rect x="5" y="110" width="110" height="6" rx="2" fill="#1E2535"/>
  <rect x="10" y="116" width="100" height="4" rx="1" fill="#151C28"/>

  <!-- Bunsen burner -->
  <rect x="53" y="104" width="14" height="8" rx="2" fill="#2A3545"/>
  <rect x="56" y="100" width="8"  height="6" rx="1" fill="#222A38"/>

  <!-- Flame -->
  <g id="flame">
    <ellipse cx="60" cy="102" rx="6" ry="9" fill="url(#flame)"/>
    <ellipse cx="60" cy="105" rx="3" ry="5" fill="#FFE000"/>
  </g>

  <!-- Beaker glass -->
  <path d="M38,40 L38,95 Q38,100 43,100 L77,100 Q82,100 82,95 L82,40 Z"
        fill="url(#beaker)" stroke="#3A6A8A" stroke-width="1.5" opacity="0.85"/>
  <!-- Beaker neck -->
  <rect x="43" y="30" width="34" height="12" rx="3" fill="url(#beaker)" stroke="#3A6A8A" stroke-width="1.5"/>

  <!-- Liquid inside beaker -->
  <g id="liquid">
    <path d="M39,70 L81,70 L81,95 Q81,99 77,99 L43,99 Q39,99 39,95 Z" fill="url(#liq)" opacity="0.85"/>
    <!-- Highlight on liquid surface -->
    <ellipse cx="60" cy="70" rx="21" ry="3" fill="#00FFB8" opacity="0.4"/>
  </g>

  <!-- Glow effect around beaker -->
  <rect id="glow" x="36" y="38" width="48" height="64" rx="4" fill="#00FFAA" opacity="0.3"/>

  <!-- Bubbles -->
  <circle class="bubble" cx="50" cy="68" r="3" fill="none" stroke="#00FFAA" stroke-width="1.2" style="--d:1.6s;--dl:0s;  --bx:-4px;--by:-28px"/>
  <circle class="bubble" cx="60" cy="72" r="4" fill="none" stroke="#44FFCC" stroke-width="1" style="--d:1.9s;--dl:0.4s;--bx:2px; --by:-35px"/>
  <circle class="bubble" cx="70" cy="66" r="2.5" fill="none" stroke="#00FFAA" stroke-width="1" style="--d:1.4s;--dl:0.8s;--bx:6px; --by:-25px"/>
  <circle class="bubble" cx="55" cy="75" r="3.5" fill="none" stroke="#22FFBB" stroke-width="1.2" style="--d:2.0s;--dl:1.2s;--bx:-6px;--by:-30px"/>
  <circle class="bubble" cx="65" cy="80" r="2" fill="none" stroke="#00FFAA" stroke-width="1" style="--d:1.7s;--dl:1.6s;--bx:3px; --by:-20px"/>

  <!-- Steam wisps -->
  <ellipse id="steam1" cx="52" cy="35" rx="4" ry="6" fill="#3A6A5A" opacity="0.5"/>
  <ellipse id="steam2" cx="60" cy="35" rx="5" ry="7" fill="#3A6A5A" opacity="0.5"/>
  <ellipse id="steam3" cx="68" cy="35" rx="4" ry="6" fill="#3A6A5A" opacity="0.5"/>

  <!-- Atom symbols floating -->
  <text x="10" y="55" font-size="10" fill="#2A6A4A" opacity="0.5" font-family="monospace">H₂O</text>
  <text x="88" y="60" font-size="9"  fill="#2A5A4A" opacity="0.4" font-family="monospace">CO₂</text>
</svg>
<div class="label">Mixing up your lesson…</div>
</body></html>
