<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; }
svg { width:170px; height:145px; }
.label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

/* Book cover opens */
#cover { animation: openCover 4s ease-in-out infinite; transform-origin: 30px 75px; }
@keyframes openCover {
  0%,10%  { transform: rotateY(0deg); }
  30%,80% { transform: rotateY(-60deg); }
  90%,100%{ transform: rotateY(0deg); }
}
/* Pages flip one by one */
#page1 { animation: flip1 4s ease-in-out infinite; transform-origin: 65px 75px; }
#page2 { animation: flip2 4s ease-in-out infinite; transform-origin: 65px 75px; }
#page3 { animation: flip3 4s ease-in-out infinite; transform-origin: 65px 75px; }
@keyframes flip1 {
  0%,20%  { transform:rotateY(0deg);    opacity:1; }
  35%,80% { transform:rotateY(-140deg); opacity:0.8; }
  90%,100%{ transform:rotateY(0deg);    opacity:1; }
}
@keyframes flip2 {
  0%,30%  { transform:rotateY(0deg);    opacity:1; }
  45%,80% { transform:rotateY(-140deg); opacity:0.8; }
  90%,100%{ transform:rotateY(0deg);    opacity:1; }
}
@keyframes flip3 {
  0%,40%  { transform:rotateY(0deg);    opacity:1; }
  55%,80% { transform:rotateY(-140deg); opacity:0.8; }
  90%,100%{ transform:rotateY(0deg);    opacity:1; }
}
/* Text lines on page appear */
.pline { animation: lineIn 4s ease-in-out infinite var(--ld); stroke-dasharray:55; stroke-dashoffset:55; }
@keyframes lineIn {
  0%,25%  { stroke-dashoffset:55; }
  55%,85% { stroke-dashoffset:0; }
  90%,100%{ stroke-dashoffset:55; }
}
/* Glow on spine */
#spine { animation: spineGlow 4s ease-in-out infinite; }
@keyframes spineGlow {
  0%,10% { fill:#3D1A6E; }
  30%,80% { fill:#7B52CC; }
  90%,100% { fill:#3D1A6E; }
}
/* Floating letters from book */
.letter { animation: floatLetter 4s ease-out infinite var(--ll); opacity:0; }
@keyframes floatLetter {
  0%,50%  { opacity:0; transform:translate(0,0) scale(0.5); }
  60%     { opacity:1; transform:translate(var(--lx),var(--ly)) scale(1); }
  80%,100% { opacity:0; transform:translate(calc(var(--lx)*2),calc(var(--ly)*2)) scale(0.3); }
}
</style></head><body>
<svg viewBox="0 0 130 120">
  <defs>
    <linearGradient id="coverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7B52CC"/>
      <stop offset="100%" stop-color="#3D1A6E"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- Book spine -->
  <rect id="spine" x="28" y="25" width="8" height="80" rx="2" fill="#3D1A6E"/>
  <!-- Back cover -->
  <rect x="30" y="25" width="75" height="80" rx="3" fill="#2A1A50" stroke="#4A2DA0" stroke-width="1"/>
  <!-- Pages stack -->
  <g id="page3"><rect x="32" y="27" width="70" height="76" rx="2" fill="#D5D8F5"/></g>
  <g id="page2"><rect x="32" y="27" width="70" height="76" rx="2" fill="#DDEAF5"/></g>
  <g id="page1">
    <rect x="32" y="27" width="70" height="76" rx="2" fill="url(#pageGrad)"/>
    <!-- Ruled lines on visible page -->
    <line class="pline" x1="38" y1="45" x2="95" y2="45" stroke="#7B52CC" stroke-width="1" style="--ld:0.5s"/>
    <line class="pline" x1="38" y1="55" x2="95" y2="55" stroke="#7B52CC" stroke-width="1" style="--ld:0.9s"/>
    <line class="pline" x1="38" y1="65" x2="85" y2="65" stroke="#7B52CC" stroke-width="1" style="--ld:1.3s"/>
    <line class="pline" x1="38" y1="75" x2="90" y2="75" stroke="#7B52CC" stroke-width="1" style="--ld:1.7s"/>
    <line class="pline" x1="38" y1="85" x2="80" y2="85" stroke="#7B52CC" stroke-width="0.8" style="--ld:2.1s"/>
    <!-- Small illustration on page -->
    <circle cx="75" cy="58" r="12" fill="none" stroke="#C0A0FF" stroke-width="1" opacity="0.5"/>
    <text x="71" y="62" font-size="10" fill="#7B52CC" opacity="0.7">∑</text>
  </g>
  <!-- Front cover -->
  <g id="cover">
    <rect x="30" y="25" width="35" height="80" rx="3" fill="url(#coverGrad)" stroke="#7B52CC" stroke-width="1"/>
    <!-- Cover title lines -->
    <rect x="34" y="40" width="27" height="3" rx="1.5" fill="#C0A0FF" opacity="0.6"/>
    <rect x="34" y="47" width="20" height="2" rx="1" fill="#9B70FF" opacity="0.5"/>
    <!-- Cover star -->
    <text x="41" y="72" font-size="14" fill="#FFD700" opacity="0.8">★</text>
  </g>

  <!-- Letters floating out -->
  <text class="letter" x="100" y="50" font-size="12" fill="#7B52CC" style="--ll:1s;--lx:15px;--ly:-18px">A</text>
  <text class="letter" x="100" y="65" font-size="11" fill="#FF6B6B" style="--ll:1.4s;--lx:18px;--ly:-5px">∑</text>
  <text class="letter" x="100" y="80" font-size="10" fill="#FFD700" style="--ll:1.8s;--lx:14px;--ly:10px">π</text>
</svg>
<div class="label">Opening the book of knowledge…</div>
</body></html>
