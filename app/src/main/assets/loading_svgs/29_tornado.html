<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; overflow:hidden; }
svg { width:155px; height:165px; }
.label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

#tornado { animation: spin 0.8s linear infinite; transform-origin:60px 55px; }
@keyframes spin { 100% { transform:rotate(360deg); } }
.ring { animation: ringPulse var(--d) ease-in-out infinite var(--dl); }
@keyframes ringPulse {
  0%,100% { transform:scaleX(1); opacity:var(--op); }
  50%     { transform:scaleX(1.15); opacity:calc(var(--op)*0.7); }
}
.debris { animation: orbit var(--d) linear infinite var(--dl); transform-origin:60px 95px; }
@keyframes orbit { 100% { transform:rotate(360deg); } }
#cloud { animation: cloudDark 2s ease-in-out infinite; }
@keyframes cloudDark { 0%,100% { fill:#1A1A2A; } 50% { fill:#2A2A3A; } }
.lightning { animation: flash 2.5s ease-in-out infinite var(--dl); opacity:0; }
@keyframes flash { 0%,90%,100% { opacity:0; } 92%,96% { opacity:1; } }
</style></head><body>
<svg viewBox="0 0 120 130">
  <defs>
    <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6644AA"/>
      <stop offset="100%" stop-color="#2A1A44"/>
    </linearGradient>
    <linearGradient id="skyg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0A0A18"/>
      <stop offset="100%" stop-color="#1A1228"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A3020"/>
      <stop offset="100%" stop-color="#1A2015"/>
    </linearGradient>
  </defs>

  <rect width="120" height="130" fill="url(#skyg)"/>

  <!-- Stormy cloud -->
  <g id="cloud">
    <ellipse cx="60" cy="22" rx="48" ry="18" fill="#1A1A2A"/>
    <ellipse cx="38" cy="28" rx="22" ry="14" fill="#222232"/>
    <ellipse cx="82" cy="27" rx="20" ry="13" fill="#222232"/>
    <ellipse cx="60" cy="32" rx="30" ry="12" fill="#2A2A3A"/>
  </g>

  <!-- Lightning bolts -->
  <polyline class="lightning" points="35,30 30,48 36,48 28,65" stroke="#FFD700" stroke-width="2" fill="none" stroke-linecap="round" style="--dl:0s"/>
  <polyline class="lightning" points="88,30 85,46 90,46 84,62" stroke="#AADDFF" stroke-width="1.5" fill="none" stroke-linecap="round" style="--dl:1.2s"/>

  <!-- Tornado funnel as rings that spin -->
  <g id="tornado">
    <ellipse class="ring" cx="60" cy="38" rx="26" ry="5" fill="none" stroke="url(#tg)" stroke-width="3" style="--d:1.8s;--dl:0s;--op:0.9"/>
    <ellipse class="ring" cx="60" cy="48" rx="21" ry="4" fill="none" stroke="url(#tg)" stroke-width="3" style="--d:2.0s;--dl:0.1s;--op:0.85"/>
    <ellipse class="ring" cx="60" cy="57" rx="16" ry="3.5" fill="none" stroke="#8855CC" stroke-width="2.5" style="--d:1.7s;--dl:0.2s;--op:0.8"/>
    <ellipse class="ring" cx="60" cy="65" rx="12" ry="3" fill="none" stroke="#7744BB" stroke-width="2" style="--d:1.9s;--dl:0.3s;--op:0.75"/>
    <ellipse class="ring" cx="60" cy="72" rx="8"  ry="2.5" fill="none" stroke="#6633AA" stroke-width="2" style="--d:2.1s;--dl:0.4s;--op:0.7"/>
    <ellipse class="ring" cx="60" cy="79" rx="5"  ry="2" fill="none" stroke="#5522AA" stroke-width="1.5" style="--d:1.6s;--dl:0.5s;--op:0.65"/>
    <ellipse class="ring" cx="60" cy="85" rx="3"  ry="1.5" fill="none" stroke="#4411AA" stroke-width="1.5" style="--d:1.8s;--dl:0.6s;--op:0.6"/>
  </g>

  <!-- Funnel solid fill -->
  <polygon points="34,38 86,38 66,92 54,92" fill="url(#tg)" opacity="0.3"/>

  <!-- Debris orbiting base -->
  <g class="debris" style="--d:1.2s;--dl:0s">
    <rect x="68" y="92" width="5" height="3" rx="1" fill="#8B6A3A" transform="rotate(20 70 93)"/>
  </g>
  <g class="debris" style="--d:1.2s;--dl:0.4s">
    <circle cx="52" cy="95" r="2.5" fill="#5A7A3A"/>
  </g>
  <g class="debris" style="--d:1.2s;--dl:0.8s">
    <rect x="72" y="94" width="4" height="2" rx="1" fill="#6A4A2A"/>
  </g>

  <!-- Ground -->
  <ellipse cx="60" cy="115" rx="58" ry="12" fill="url(#ground)"/>
  <ellipse cx="60" cy="110" rx="58" ry="7"  fill="#1E2A18"/>
</svg>
<div class="label">Spinning up something great…</div>
</body></html>
