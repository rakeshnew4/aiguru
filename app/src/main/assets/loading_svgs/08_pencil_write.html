<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; }
  svg { width:160px; height:160px; }
  .label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

  /* Pencil moves across and back */
  #pencil_group { animation: write 4s ease-in-out infinite; }
  @keyframes write {
    0%   { transform: translateX(0)   rotate(-25deg); }
    40%  { transform: translateX(55px) rotate(-25deg); }
    45%  { transform: translateX(55px) rotate(-25deg) scaleX(-1); }
    50%  { transform: translateX(0)   rotate(-25deg) scaleX(-1); }
    55%  { transform: translateX(0)   rotate(-25deg); }
    100% { transform: translateX(0)   rotate(-25deg); }
  }

  /* Line being drawn */
  #line1 { animation: drawLine1 4s ease-in-out infinite; stroke-dasharray:55; stroke-dashoffset:55; }
  @keyframes drawLine1 {
    0%,5%  { stroke-dashoffset:55; }
    40%    { stroke-dashoffset:0; }
    100%   { stroke-dashoffset:0; }
  }
  #line2 { animation: drawLine2 4s ease-in-out infinite 4s; stroke-dasharray:55; stroke-dashoffset:55; }
  @keyframes drawLine2 {
    0%,5%  { stroke-dashoffset:55; }
    40%    { stroke-dashoffset:0; }
    100%   { stroke-dashoffset:0; }
  }

  /* Text symbols appear as written */
  .sym { animation: symPop 4s ease-in-out infinite; opacity:0; animation-delay: var(--sd); }
  @keyframes symPop {
    0%       { opacity:0; transform: scale(0.5); }
    5%,60%   { opacity:1; transform: scale(1); }
    80%,100% { opacity:0; }
  }

  /* Erase flash -->  */
  #eraser_line { animation: erase 4s ease-in-out infinite; opacity:0; }
  @keyframes erase {
    45%,55% { opacity:1; }
    0%,44%,56%,100% { opacity:0; }
  }

  /* Whole loop */
  #all { animation: loop 8s linear infinite; }
  @keyframes loop {
    0%,88%  { opacity:1; }
    90%,99% { opacity:0; }
    100%    { opacity:1; }
  }

  /* Paper subtle bob */
  #paper { animation: bob 3s ease-in-out infinite; }
  @keyframes bob {
    0%,100% { transform: rotate(0deg); }
    50%     { transform: rotate(0.5deg); }
  }
</style>
</head>
<body>
<svg viewBox="0 0 130 120">
  <defs>
    <linearGradient id="pencilBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="85%"  stop-color="#FFC200"/>
      <stop offset="86%"  stop-color="#F0A070"/>
      <stop offset="92%"  stop-color="#E08060"/>
      <stop offset="93%"  stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#202020"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2A50"/>
      <stop offset="100%" stop-color="#141E3A"/>
    </linearGradient>
  </defs>

  <g id="all">
    <!-- Paper -->
    <g id="paper">
      <rect x="20" y="30" width="90" height="75" rx="3" fill="url(#paperGrad)" stroke="#2A3C6A" stroke-width="1.5"/>
      <!-- Ruled lines -->
      <line x1="28" y1="48" x2="102" y2="48" stroke="#2A3C6A" stroke-width="0.8"/>
      <line x1="28" y1="62" x2="102" y2="62" stroke="#2A3C6A" stroke-width="0.8"/>
      <line x1="28" y1="76" x2="102" y2="76" stroke="#2A3C6A" stroke-width="0.8"/>
      <line x1="28" y1="90" x2="102" y2="90" stroke="#2A3C6A" stroke-width="0.8"/>
      <!-- Margin line -->
      <line x1="34" y1="30" x2="34" y2="105" stroke="#3D5AFE" stroke-width="0.8" opacity="0.5"/>
    </g>

    <!-- Written content (math/science symbols) -->
    <text class="sym" x="38" y="46"  font-size="9" fill="#B0C8E8" font-family="monospace" style="--sd:0.5s">E = mc²</text>
    <text class="sym" x="38" y="60"  font-size="9" fill="#B0C8E8" font-family="monospace" style="--sd:1.0s">F = ma</text>
    <text class="sym" x="38" y="74"  font-size="9" fill="#B0C8E8" font-family="monospace" style="--sd:1.8s">∑Fₙ = 0</text>
    <text class="sym" x="38" y="88"  font-size="9" fill="#B0C8E8" font-family="monospace" style="--sd:2.5s">λ = h/p</text>

    <!-- Written lines (pencil path) -->
    <line id="line1" x1="36" y1="48" x2="91" y2="48" stroke="#7B9CC8" stroke-width="1.2" stroke-linecap="round"/>
    <line id="line2" x1="36" y1="62" x2="91" y2="62" stroke="#7B9CC8" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Eraser smudge -->
    <rect id="eraser_line" x="36" y="85" width="55" height="7" rx="2" fill="#1E2A50" opacity="0.9"/>

    <!-- Pencil -->
    <g id="pencil_group" transform-origin="36 48">
      <!-- Pencil body -->
      <rect x="-10" y="-4" width="46" height="8" rx="2" fill="url(#pencilBody)" transform="translate(14,42)"/>
      <!-- Eraser end cap -->
      <rect x="-12" y="-3" width="4" height="6" rx="1" fill="#FF9090" transform="translate(14,42)"/>
      <!-- Eraser band -->
      <rect x="-9"  y="-3" width="2" height="6" fill="#C07070" transform="translate(14,42)"/>
    </g>
  </g>
</svg>
<div class="label">Writing your lesson…</div>
</body>
</html>
