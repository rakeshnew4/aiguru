<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; overflow:hidden; }
svg { width:165px; height:160px; }
.label { color:#7B9CC8; font-size:13px; margin-top:12px; letter-spacing:1px; }

/* Telescope rotates/swings to scan sky */
#scope { animation: scopeSwing 4s ease-in-out infinite; transform-origin: 55px 85px; }
@keyframes scopeSwing {
  0%,100% { transform:rotate(-25deg); }
  50%     { transform:rotate(25deg); }
}
/* Stars appear in field of view */
.viewStar { animation: starBright var(--vd) ease-in-out infinite var(--vl); opacity:0; }
@keyframes starBright {
  0%,30%  { opacity:0; r:1; }
  50%     { opacity:1; r:var(--vr,2); filter:drop-shadow(0 0 4px white); }
  70%,100%{ opacity:0; r:1; }
}
/* Eyepiece glow */
#eyeGlow { animation: eyeGlowPulse 4s ease-in-out infinite; }
@keyframes eyeGlowPulse {
  0%,100% { filter:drop-shadow(0 0 3px #4A90D9); }
  50%     { filter:drop-shadow(0 0 10px #A0E8FF); }
}
/* Nebula / galaxy spiral that drifts */
#nebula { animation: nebulaDrift 4s ease-in-out infinite; transform-origin: 80px 40px; }
@keyframes nebulaDrift {
  0%,100% { transform:translate(20px,0) scale(0.8); opacity:0.3; }
  50%     { transform:translate(-20px,5px) scale(1.2); opacity:0.7; }
}
/* Shooting star */
#shoot { animation: shootStar 4s linear infinite 1s; opacity:0; }
@keyframes shootStar {
  0%    { transform:translate(120px,-10px); opacity:0; }
  5%    { opacity:0.9; }
  20%   { transform:translate(20px,40px); opacity:0; }
  100%  { transform:translate(20px,40px); opacity:0; }
}
/* Tripod wobble (very slight) */
#tripod { animation: tripodWobble 4s ease-in-out infinite; transform-origin: 55px 100px; }
@keyframes tripodWobble {
  0%,100% { transform:rotate(0deg); }
  30%     { transform:rotate(1deg); }
  70%     { transform:rotate(-1deg); }
}
/* Stars bg twinkle */
.bgStar { animation: tw var(--d) ease-in-out infinite var(--dl); }
@keyframes tw { 0%,100% { opacity:0.15; } 50% { opacity:0.85; } }
</style></head><body>
<svg viewBox="0 0 130 130" style="overflow:hidden">
  <defs>
    <radialGradient id="skyG" cx="50%" cy="30%">
      <stop offset="0%"   stop-color="#0D1535"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <linearGradient id="scopeG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5A3A90"/>
      <stop offset="100%" stop-color="#3A1A60"/>
    </linearGradient>
    <radialGradient id="lensG">
      <stop offset="0%"   stop-color="#A0E8FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2A70A0" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="130" height="130" fill="url(#skyG)"/>

  <!-- Background stars -->
  <circle class="bgStar" cx="10"  cy="8"   r="1" fill="white" style="--d:2s;--dl:0s"/>
  <circle class="bgStar" cx="30"  cy="15"  r="1" fill="white" style="--d:1.8s;--dl:0.3s"/>
  <circle class="bgStar" cx="90"  cy="10"  r="1.5" fill="white" style="--d:2.3s;--dl:0.7s"/>
  <circle class="bgStar" cx="115" cy="5"   r="1" fill="white" style="--d:1.6s;--dl:1.1s"/>
  <circle class="bgStar" cx="50"  cy="5"   r="1" fill="white" style="--d:2.5s;--dl:0.5s"/>
  <circle class="bgStar" cx="70"  cy="20"  r="1" fill="white" style="--d:1.9s;--dl:0.9s"/>
  <circle class="bgStar" cx="100" cy="30"  r="1" fill="white" style="--d:2.1s;--dl:0.2s"/>

  <!-- Nebula / galaxy background -->
  <g id="nebula">
    <ellipse cx="80" cy="40" rx="25" ry="15" fill="none" stroke="#4A2090" stroke-width="0.8" opacity="0.5"/>
    <ellipse cx="80" cy="40" rx="18" ry="10" fill="none" stroke="#7B52CC" stroke-width="0.6" opacity="0.4"/>
    <ellipse cx="80" cy="40" rx="10" ry="6"  fill="#1A0A40" opacity="0.7"/>
    <circle cx="80" cy="40" r="3" fill="#FFD700" opacity="0.4"/>
    <!-- Spiral arms suggestion -->
    <path d="M80,40 Q90,35 95,25" fill="none" stroke="#7B52CC" stroke-width="0.8" opacity="0.5"/>
    <path d="M80,40 Q70,45 65,55" fill="none" stroke="#9B70FF" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Shooting star -->
  <g id="shoot">
    <line x1="0" y1="0" x2="20" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="25" y2="12" stroke="white" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Stars in the telescope field of view -->
  <circle class="viewStar" cx="35" cy="25"  r="2"   fill="white" style="--vd:2s;--vl:0s;   --vr:2"/>
  <circle class="viewStar" cx="55" cy="18"  r="1.5" fill="#A0E8FF" style="--vd:2.4s;--vl:0.4s;--vr:1.5"/>
  <circle class="viewStar" cx="75" cy="30"  r="3"   fill="#FFE44D" style="--vd:1.8s;--vl:0.8s;--vr:3"/>
  <circle class="viewStar" cx="110" cy="22" r="2"   fill="white" style="--vd:2.2s;--vl:1.2s;--vr:2"/>
  <circle class="viewStar" cx="20"  cy="40" r="1.5" fill="#FF9B6B" style="--vd:2.6s;--vl:0.6s;--vr:1.5"/>

  <!-- Tripod legs -->
  <g id="tripod">
    <line x1="55" y1="95" x2="30"  y2="120" stroke="#4A3070" stroke-width="3" stroke-linecap="round"/>
    <line x1="55" y1="95" x2="80"  y2="120" stroke="#4A3070" stroke-width="3" stroke-linecap="round"/>
    <line x1="55" y1="95" x2="55"  y2="122" stroke="#4A3070" stroke-width="3" stroke-linecap="round"/>
    <!-- Crossbrace -->
    <line x1="38"  y1="110" x2="72" y2="110" stroke="#3A2060" stroke-width="1.5"/>
    <!-- Feet -->
    <circle cx="30"  cy="120" r="3" fill="#3A2060"/>
    <circle cx="80"  cy="120" r="3" fill="#3A2060"/>
    <circle cx="55"  cy="122" r="3" fill="#3A2060"/>
    <!-- Mount head -->
    <circle cx="55" cy="93" r="6" fill="#5B3A9A"/>
  </g>

  <!-- Telescope tube (swings with mount) -->
  <g id="scope">
    <!-- Main tube -->
    <rect x="30" y="78" width="65" height="14" rx="7" fill="url(#scopeG)" stroke="#7B52CC" stroke-width="1"/>
    <!-- Tube detail ring -->
    <rect x="72" y="78" width="6" height="14" rx="2" fill="#5B3A9A"/>
    <!-- Objective lens (front, large) -->
    <g id="eyeGlow">
      <ellipse cx="92" cy="85" rx="7" ry="7" fill="url(#lensG)" stroke="#A0E8FF" stroke-width="1.5"/>
      <ellipse cx="91" cy="83" rx="3" ry="4" fill="white" opacity="0.2"/>
    </g>
    <!-- Eyepiece (back) -->
    <rect x="28" y="81" width="10" height="8" rx="4" fill="#3A1A60" stroke="#7B52CC" stroke-width="1"/>
    <circle cx="28" cy="85" r="4" fill="#2A0A50" stroke="#9B70FF" stroke-width="1"/>
    <!-- Focus knob -->
    <rect x="55" y="76" width="10" height="5" rx="2.5" fill="#5B3A9A"/>
    <circle cx="60" cy="74" r="3" fill="#7B52CC"/>
  </g>

  <!-- Ground/hill -->
  <ellipse cx="65" cy="122" rx="65" ry="10" fill="#0D1525"/>
  <rect x="0" y="120" width="130" height="10" fill="#0D1525"/>
</svg>
<div class="label">Exploring the universe for you…</div>
</body></html>
