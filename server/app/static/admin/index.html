<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Guru — Admin Portal</title>
  <link rel="stylesheet" href="/static/admin/css/styles.css" />
</head>
<body>

  <!-- ═══════════════════════ LOGIN SCREEN ═══════════════════════ -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-icon">&#9881;</div>
        <h1>AI Guru Admin</h1>
        <p>Sign in to access the admin portal</p>
      </div>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input id="login-username" type="text" placeholder="admin" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
        <div id="login-error" class="error-msg hidden"></div>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════ MAIN APP ═══════════════════════════ -->
  <div id="app" class="app hidden">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">AI Guru</span>
        <span class="sidebar-sub">Admin Portal</span>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item" data-section="dashboard">
          <span class="nav-icon">&#9632;</span> Dashboard
        </a>
        <a class="nav-item" data-section="users">
          <span class="nav-icon">&#128100;</span> Users
        </a>
        <div class="nav-group-label">Content</div>
        <a class="nav-item" data-section="subjects">
          <span class="nav-icon">&#128218;</span> Subjects
        </a>
        <a class="nav-item" data-section="chapters">
          <span class="nav-icon">&#128196;</span> Chapters
        </a>
        <div class="nav-group-label">Commerce</div>
        <a class="nav-item" data-section="plans">
          <span class="nav-icon">&#128179;</span> Plans
        </a>
        <a class="nav-item" data-section="schools">
          <span class="nav-icon">&#127979;</span> Schools
        </a>
        <a class="nav-item" data-section="payments">
          <span class="nav-icon">&#128181;</span> Payments
        </a>
        <div class="nav-group-label">Configuration</div>
        <a class="nav-item" data-section="models">
          <span class="nav-icon">&#129302;</span> Model Config
        </a>
        <a class="nav-item" data-section="appconfig">
          <span class="nav-icon">&#9881;</span> App Config
        </a>
        <a class="nav-item" data-section="offers">
          <span class="nav-icon">&#127873;</span> Offers
        </a>
        <a class="nav-item" data-section="notifications">
          <span class="nav-icon">&#128276;</span> Notifications
        </a>
        <a class="nav-item" data-section="referrals">
          <span class="nav-icon">&#128279;</span> Referral Codes
        </a>
      </nav>

      <div class="sidebar-footer">
        <span id="sidebar-user">admin</span>
        <button id="logout-btn" class="btn-logout">Logout</button>
      </div>
    </aside>

    <!-- ── Main Content ── -->
    <div class="main-wrapper">
      <header class="topbar">
        <button class="sidebar-toggle" id="sidebar-toggle">&#9776;</button>
        <h2 id="page-title">Dashboard</h2>
        <div class="topbar-right">
          <span class="topbar-badge" id="topbar-user"></span>
        </div>
      </header>

      <main class="content-area">
        <section id="section-dashboard"     class="section"></section>
        <section id="section-users"         class="section hidden"></section>
        <section id="section-subjects"      class="section hidden"></section>
        <section id="section-chapters"      class="section hidden"></section>
        <section id="section-plans"         class="section hidden"></section>
        <section id="section-schools"       class="section hidden"></section>
        <section id="section-payments"      class="section hidden"></section>
        <section id="section-models"        class="section hidden"></section>
        <section id="section-appconfig"     class="section hidden"></section>
        <section id="section-offers"        class="section hidden"></section>
        <section id="section-notifications" class="section hidden"></section>
        <section id="section-referrals"     class="section hidden"></section>
      </main>
    </div>
  </div>

  <!-- ═══════════════════════ GLOBAL MODAL ══════════════════════ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Edit</h3>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary"   id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════ TOAST ═════════════════════════════ -->
  <div id="toast-container"></div>

  <!-- ═══════════════════════ SCRIPTS ═══════════════════════════ -->
  <!-- Load order matters: api → section modules → app (router last) -->
  <script src="/static/admin/js/api.js"></script>
  <script src="/static/admin/js/dashboard.js"></script>
  <script src="/static/admin/js/users.js"></script>
  <script src="/static/admin/js/content.js"></script>
  <script src="/static/admin/js/plans.js"></script>
  <script src="/static/admin/js/payments.js"></script>
  <script src="/static/admin/js/models.js"></script>
  <script src="/static/admin/js/config.js"></script>
  <script src="/static/admin/js/referrals.js"></script>
  <script src="/static/admin/js/app.js"></script>
</body>
</html>
