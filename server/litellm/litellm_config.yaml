num_workers: 2
timeout: 300

# ─── Model Management ──────────────────────────────────────────────────
# LiteLLM Config - Models are loaded from PostgreSQL (configured via admin UI)
# 
# DO NOT define models here with api_base pointing to localhost:8005!
# That creates a recursive loop (proxy calling itself).
#
# How models are added:
#  1. Start a model with a real provider (Gemini, OpenAI, Claude, etc.)
#  2. Configure via http://localhost:8006 (admin UI)
#  3. Models are stored in PostgreSQL and loaded automatically
#
# The model_list below is EMPTY - models come from the database.

model_list: []

# ─── General Settings ────────────────────────────────────────────────

general_settings:
  log_level: "INFO"
  log_responses: true
  litellm_drop_incomplete_logs: false
  enable_authentication: true
  authentication_strategy: "api_key"
  request_timeout: 600
